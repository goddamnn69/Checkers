name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish Checkers/Checkers/Checkers.csproj -c Release -o publish -r win-x64 --self-contained true

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Download previous releases (for delta updates)
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack with Velopack
        run: vpk pack -u Checkers -v ${{ steps.version.outputs.version }} -p publish -e Checkers.exe --icon Checkers/Checkers/app.ico

      - name: Upload to GitHub Releases
        run: vpk upload github --repoUrl https://github.com/${{ github.repository }} --publish --releaseName "Checkers ${{ steps.version.outputs.version }}" --tag ${{ github.ref_name }} --token ${{ secrets.GITHUB_TOKEN }}
